# nginx site for ws.borsa.cc -> ws-relay (127.0.0.1:8100)
# Install: copy to /etc/nginx/sites-available/ws.borsa.cc, symlink into
# sites-enabled, then run certbot (see commands below) to add TLS on :443.
#
#   sudo cp ws.borsa.cc.conf /etc/nginx/sites-available/ws.borsa.cc
#   sudo ln -s /etc/nginx/sites-available/ws.borsa.cc /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d ws.borsa.cc        # provisions cert + rewrites to 443
#
# certbot rewrites this block to listen on 443 with the cert and adds an
# 80->443 redirect automatically.

# Per-client-IP connection cap at the edge (http context via sites-enabled).
limit_conn_zone $binary_remote_addr zone=wsperip:10m;

server {
    listen 80;
    listen [::]:80;
    server_name ws.borsa.cc;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        limit_conn wsperip 100;
    }
}
